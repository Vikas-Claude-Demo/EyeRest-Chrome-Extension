<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Take a break! - EyeRest</title>
    <link rel="stylesheet" href="break.css">
</head>
<body>
    <div class="container">
        
        <div class="timer-container">
            <svg class="timer-circle">
                <circle class="timer-bg" />
                <circle class="timer-progress" id="timerProgress" />
            </svg>
            <div class="timer-text" id="timerText">--</div>
        </div>

        <div class="card">
            <div class="header-content">
                <div class="brand-text">EyeRest</div>
                <h1 id="messageTitle">Take a break!</h1>
                <p class="subtitle">Spend a few seconds now, for a healthier future.</p>
            </div>
            
            <div class="exercises-frame">
                <div class="exercise-text" id="exerciseText">
                    Blink your eyes, move them around and look at a distant object.
                </div>
                
                <div class="controls">
                    <button class="nav-btn prev-btn" id="prevBtn">&lt;</button>
                    <div class="indicator-container" id="indicatorContainer">
                    </div>
                    <button class="nav-btn next-btn" id="nextBtn">&gt;</button>
                </div>
            </div>
        </div>
        
        <div class="action-footer">
            <div class="extend-group" id="extendGroup">
                <span>Extend:</span>
                <button class="extend-btn" data-add="10">+10s</button>
                <button class="extend-btn" data-add="20">+20s</button>
                <button class="extend-btn" data-add="30">+30s</button>
            </div>
            <button class="skip-btn" id="skipBtn">Skip Break</button>
        </div>

    </div>
    <script src="break.js"></script>
</body>
</html>
