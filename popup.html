<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <title>EyeRest Settings</title>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="icons/logo.png" alt="EyeRest logo" class="eye-icon">
            <h2>EyeRest</h2>
        </div>
        <label class="switch">
            <input type="checkbox" id="enabledToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="settings-group" id="settingsGroup">
        <div class="row column">
            <div style="width: 100%; display: flex; justify-content: space-between;">
                <span class="label-text">Break Interval</span>
                <span class="label-text"><span id="intervalValue" class="value-highlight">20</span> min</span>
            </div>
            <input type="range" id="intervalSlider" min="1" max="120" value="20">
        </div>
        
        <div class="row column">
            <div style="width: 100%; display: flex; justify-content: space-between;">
                <span class="label-text">Break Duration</span>
                <span class="label-text"><span id="durationValue" class="value-highlight">20</span> sec</span>
            </div>
            <input type="range" id="durationSlider" min="5" max="300" step="5" value="20">
        </div>
        
        <div class="row">
            <span class="label-text">Show Exercises Page</span>
            <label class="switch">
                <input type="checkbox" id="exercisesToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span class="label-text">Desktop Notification</span>
            <label class="switch">
                <input type="checkbox" id="notificationToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row column">
            <span class="label-text">Notification Message</span>
            <input type="text" id="customMessage" value="Take a break!" placeholder="Enter your custom reminder...">
        </div>
    </div>

    <div class="footer">
        <div class="timer" id="timerDisplay">--</div>
        <div class="links">
            <a href="#" id="resetBtn">Reset Default</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
